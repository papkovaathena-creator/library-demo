services:
  backend:
    image: library-backend
    pull_policy: never
    container_name: library-backend
    build:
      context: .
      dockerfile: Backend.Dockerfile
    ports:
      - 8000:8080

  postgres:
    image: postgres:18.3
    container_name: library-postgres
    environment:
      POSTGRES_PASSWORD: password
    ports:
      - 5431:5432